<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatMail - Messagerie</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive;
            background-color: #FCE4EC;
            text-align: center;
        }
        header {
            background-color: #FF4081;
            padding: 20px;
            color: white;
            border-radius: 10px;
        }
        button {
            background-color: #FF4081;
            border: none;
            padding: 10px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🐾 Messagerie CatMail 🐾</h1>
        <p>Bienvenue, <span id="username"></span>@ahomine-off.github.io/catmail !</p>
    </header>
    <main>
        <form id="catmail-message">
            <label for="to">À :</label>
            <input type="text" id="to" placeholder="Destinataire">
            
            <label for="message">Message :</label>
            <textarea id="message" placeholder="Écris ton plus beau miaou ici..."></textarea>
            
            <button type="submit">Envoyer 📩</button>
        </form>
    </main>
    <script>
        document.getElementById("username").innerText = localStorage.getItem("catmailUser");

        document.getElementById("catmail-message").addEventListener("submit", function(event) {
            event.preventDefault();
            alert("Miaou envoyé avec succès ! 🚀");
        });
    </script>
</body>
</html>
