<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatMail - Messagerie améliorée</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive;
            background-color: #FCE4EC;
            text-align: center;
        }
        header {
            background-color: #FF4081;
            padding: 20px;
            color: white;
            border-radius: 10px;
        }
        button {
            background-color: #FF4081;
            border: none;
            padding: 10px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        .message-container {
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 10px auto;
            width: 80%;
            text-align: left;
        }
    </style>
</head>
<body>
    <header>
        <h1>🐾 CatMail - Nouvelle Messagerie 🐾</h1>
        <p>Bienvenue, <span id="username"></span>@ahomine-off.github.io/catmail !</p>
    </header>
    <main>
        <h2>📩 Messages reçus :</h2>
        <div id="messages"></div>

        <h2>✉️ Envoyer un CatMail :</h2>
        <form id="catmail-message">
            <label for="to">À :</label>
            <input type="email" id="to" placeholder="Destinataire (ex: exemple@gmail.com)" required>
            
            <label for="subject">Sujet :</label>
            <input type="text" id="subject" placeholder="Sujet de ton CatMail" required>
            
            <label for="message">Message :</label>
            <textarea id="message" placeholder="Écris ton plus beau miaou ici..." required></textarea>
            
            <button type="submit">Envoyer 📩</button>
        </form>
    </main>
    <script>
        let currentUser = localStorage.getItem("catmailUser") || "Chaton";
        document.getElementById("username").innerText = currentUser + "@ahomine-off.github.io/catmail";

        function afficherMessages() {
            let messages = JSON.parse(localStorage.getItem("catmailMessages")) || [];
            let messagesDiv = document.getElementById("messages");
            messagesDiv.innerHTML = "";

            messages.forEach(msg => {
                if (msg.to === currentUser) {
                    let messageBlock = document.createElement("div");
                    messageBlock.className = "message-container";
                    messageBlock.innerHTML = `<strong>De : ${msg.from}</strong><br>${msg.text}`;
                    messagesDiv.appendChild(messageBlock);
                }
            });
        }

        afficherMessages();

        document.getElementById("catmail-message").addEventListener("submit", function(event) {
            event.preventDefault();
            let toUser = document.getElementById("to").value.trim();
            let subject = document.getElementById("subject").value.trim();
            let messageText = document.getElementById("message").value.trim();

            if (toUser && messageText) {
                let messages = JSON.parse(localStorage.getItem("catmailMessages")) || [];
                messages.push({ from: currentUser, to: toUser, subject: subject, text: messageText });
                localStorage.setItem("catmailMessages", JSON.stringify(messages));

                alert("Miaou envoyé avec succès ! 🚀");
                afficherMessages();
            } else {
                alert("Miaouuu ! Remplis bien tous les champs !");
            }
        });
    </script>
</body>
</html>
