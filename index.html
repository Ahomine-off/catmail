<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatMail - Créer son adresse féline</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive;
            background-color: #FCE4EC;
            text-align: center;
        }
        header {
            background-color: #FF4081;
            padding: 20px;
            color: white;
            border-radius: 10px;
        }
        button {
            background-color: #FF4081;
            border: none;
            padding: 10px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🐾 Bienvenue sur CatMail 🐾</h1>
        <p>Crée ton adresse CatMail et rejoins l'univers félin !</p>
    </header>
    <main>
        <form id="catmail-signup">
            <label for="username">Choisis ton nom d'utilisateur :</label>
            <input type="text" id="username" placeholder="Ex: SuperChaton">
            
            <p>@catmail.croquettes</p>
            
            <label for="password">Mot de passe :</label>
            <input type="password" id="password" placeholder="••••••••">
            
            <label for="avatar">Choisis ton avatar :</label>
            <select id="avatar">
                <option>😺 Chat joueur</option>
                <option>🐈 Chat sérieux</option>
                <option>🐾 Chat explorateur</option>
                <option>😼 Chat malin</option>
            </select>
            
            <button type="submit">Créer mon adresse CatMail 📩</button>
        </form>
        <p id="confirmation-message" style="display:none; color:green;"></p>
    </main>
    <script>
        document.getElementById("catmail-signup").addEventListener("submit", function(event) {
            event.preventDefault();
            let username = document.getElementById("username").value;
            document.getElementById("confirmation-message").innerText = 
                "Miaouuu ! Ton adresse " + username + "@catmail.croquettes a été créée ! 🚀";
            document.getElementById("confirmation-message").style.display = "block";
        });
    </script>
</body>
</html>
