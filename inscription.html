<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatMail - Inscription</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive;
            background-color: #FCE4EC;
            text-align: center;
        }
        header {
            background-color: #FF4081;
            padding: 20px;
            color: white;
            border-radius: 10px;
        }
        button {
            background-color: #FF4081;
            border: none;
            padding: 10px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🐾 Crée ton adresse CatMail ! 🐾</h1>
    </header>
    <main>
        <form id="catmail-signup">
            <label for="username">Nom d'utilisateur :</label>
            <input type="text" id="username" required>
            <p>@ahomine-off.github.io/catmail</p>
            
            <label for="password">Mot de passe :</label>
            <input type="password" id="password" required>
            
            <button type="submit">Créer mon CatMail 📩</button>
        </form>
        <p id="confirmation-message" style="display:none; color:green;"></p>
    </main>
    <script>
        document.getElementById("catmail-signup").addEventListener("submit", function(event) {
            event.preventDefault();
            let username = document.getElementById("username").value.trim();
            let password = document.getElementById("password").value.trim();

            if (username && password) {
                // Enregistrement des valeurs dans localStorage
                localStorage.setItem("catmailUser", username);
                localStorage.setItem("catmailPass", password);

                // Vérification en console
                console.log("Utilisateur enregistré :", localStorage.getItem("catmailUser"));
                console.log("Mot de passe enregistré :", localStorage.getItem("catmailPass"));

                // Confirmation à l'écran
                document.getElementById("confirmation-message").innerText =
                    "Miaou ! Ton adresse " + username + "@ahomine-off.github.io/catmail a été créée ! 🚀";
                document.getElementById("confirmation-message").style.display = "block";

                // Redirection vers la connexion après 2 sec
                setTimeout(() => window.location.href = "connexion.html", 2000);
            } else {
                alert("Miaouuu ! Remplis bien tous les champs !");
            }
        });
    </script>
</body>
</html>
